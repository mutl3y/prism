[tox]
envlist = py
skipsdist = False

[testenv]
package = editable
allowlist_externals =
    make
deps =
    pytest
    pytest-cov
    PyYAML
    Jinja2
commands =
    make -f {toxinidir}/Makefile.pod clean-demo-readmes
    pytest -v --cov=src/ansible_role_doc --cov-report=term-missing:skip-covered --cov-report=xml:{toxinidir}/debug_readmes/coverage.xml --cov-fail-under=80
    python -m ansible_role_doc.cli {toxinidir}/src/ansible_role_doc/tests/mock_role -o {toxinidir}/debug_readmes/REVIEW_README.md -v
setenv =
    PYTHONPATH = {toxinidir}/src
basepython = python3.14


[testenv:lint]
description = run ruff and black checks
deps =
    ruff
    black
commands =
    ruff check .
    black --check .


[testenv:pylint]
description = run pylint against the package and tests
deps =
    pylint
commands =
    pylint src/ansible_role_doc tests


[testenv:precommit]
description = run pre-commit hooks (useful locally and in CI)
deps =
    pre-commit
commands =
    pre-commit run --all-files
