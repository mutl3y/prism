[tox]
envlist = py
skipsdist = False

[testenv]
package = editable
allowlist_externals =
    make
deps =
    pytest
    pytest-cov
    PyYAML
    Jinja2
commands =
    make -f {toxinidir}/Makefile.pod clean-demo-readmes
    pytest -v --cov=src/prism --cov-report=term-missing:skip-covered --cov-report=xml:{toxinidir}/debug_readmes/coverage.xml --cov-fail-under=80
setenv =
    PYTHONPATH = {toxinidir}/src
basepython = python3.14


[testenv:readmes]
description = generate review README variants (md/html/json/concise/skeleton/in-role-config)
package = editable
allowlist_externals =
    make
deps =
    PyYAML
    Jinja2
commands =
    make -f {toxinidir}/Makefile.pod clean-demo-readmes
    make -f {toxinidir}/Makefile.pod demo-readmes
setenv =
    PYTHONPATH = {toxinidir}/src
basepython = python3.14


[testenv:lint]
description = run ruff and black checks
deps =
    ruff
    black
commands =
    ruff check src/
    black --check src/


[testenv:pylint]
description = run pylint against the package and tests
deps =
    pylint
commands =
    pylint src/prism src/prism/tests


[testenv:precommit]
description = run pre-commit hooks (useful locally and in CI)
deps =
    pre-commit
commands =
    pre-commit run --all-files


[testenv:typecheck]
description = run mypy on the modernized seam modules (incremental gate)
deps =
    mypy
commands =
    mypy \
        --ignore-missing-imports \
        --disable-error-code=import-untyped \
        --follow-imports=silent \
        src/prism/scanner_submodules/scan_context.py \
        src/prism/scanner_submodules/scan_request.py \
        src/prism/scanner_submodules/scan_output_emission.py \
        src/prism/scanner_submodules/scan_output_primary.py \
        src/prism/scanner_submodules/scan_metrics.py \
        src/prism/scanner_submodules/scan_discovery.py \
        src/prism/scanner_submodules/scanner_report.py \
        src/prism/scanner_submodules/output.py \
        src/prism/scanner_submodules/runbook.py \
        src/prism/scanner_submodules/readme_config.py \
        src/prism/scanner_submodules/style_vars.py \
        src/prism/scanner_submodules/requirements.py \
        src/prism/scanner_submodules/doc_insights.py \
        src/prism/scanner_submodules/style_guide.py \
        src/prism/scanner_submodules/task_parser.py \
        src/prism/scanner_submodules/variable_extractor.py \
        src/prism/scanner.py \
        src/prism/api.py \
        src/prism/cli.py \
        src/prism/pattern_config.py \
        src/prism/collection_plugins.py \
        src/prism/feedback.py \
        src/prism/init.py \
        src/prism/_jinja_analyzer.py \
        src/prism/repo_services.py
