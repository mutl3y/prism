[tox]
envlist = py
skipsdist = False

[testenv]
deps =
    pytest
    PyYAML
    Jinja2
commands =
    pytest -v
setenv =
    PYTHONPATH = {toxinidir}/src
basepython = python3.14


[testenv:lint]
description = run ruff and black checks
deps =
    ruff
    black
commands =
    ruff check .
    black --check .


[testenv:pylint]
description = run pylint against the package and tests
deps =
    pylint
commands =
    pylint src/ansible_role_doc tests


[testenv:precommit]
description = run pre-commit hooks (useful locally and in CI)
deps =
    pre-commit
commands =
    pre-commit run --all-files
