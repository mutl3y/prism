[tox]
envlist = py
skipsdist = False

[testenv]
package = editable
allowlist_externals =
    make
deps =
    pytest
    pytest-cov
    pyfakefs
    PyYAML
    Jinja2
commands =
    make -f {toxinidir}/Makefile.pod clean-demo-readmes
    pytest -v --cov=src/prism --cov-report=term-missing:skip-covered --cov-report=xml:{toxinidir}/debug_readmes/coverage.xml --cov-fail-under=65
setenv =
    PYTHONPATH = {toxinidir}/src
basepython = python3.14


[testenv:readmes]
description = generate review README variants (md/html/json/concise/skeleton/in-role-config)
package = editable
allowlist_externals =
    make
deps =
    PyYAML
    Jinja2
commands =
    make -f {toxinidir}/Makefile.pod clean-demo-readmes
    make -f {toxinidir}/Makefile.pod demo-readmes
setenv =
    PYTHONPATH = {toxinidir}/src
basepython = python3.14


[testenv:readmes-fsrc]
description = generate review README variants using the fsrc lane
package = editable
allowlist_externals =
    make
deps =
    PyYAML
    Jinja2
commands =
    make -f {toxinidir}/Makefile.pod clean-demo-readmes
    make -f {toxinidir}/Makefile.pod demo-readmes-fsrc
setenv =
    PYTHONPATH = {toxinidir}/src
basepython = python3.14


[testenv:lint]
description = run ruff and black checks
deps =
    ruff==0.15.6
    black==25.1.0
commands =
    ruff check src/
    black --check src/


[testenv:pylint]
description = run pylint against the package and tests
deps =
    pylint
commands =
    pylint src/prism src/prism/tests


[testenv:precommit]
description = run pre-commit hooks (useful locally and in CI)
deps =
    pre-commit
commands =
    pre-commit run --all-files


[testenv:typecheck]
description = run mypy on the modernized seam modules (incremental gate)
deps =
    mypy
commands =
    mypy src/prism --exclude src/prism/tests


[testenv:smoke-src-lane]
description = run smoke import checks under src lane isolation
package = editable
deps =
    pytest
commands =
    pytest -q src/prism/tests/test_fsrc_package_import_smoke.py --confcutdir=src/prism/tests
setenv =
    PYTHONPATH = {toxinidir}/src
basepython = python3.14


[testenv:smoke-fsrc-lane]
description = run smoke import checks under fsrc lane isolation
package = editable
deps =
    pytest
commands =
    pytest -q src/prism/tests/test_fsrc_package_import_smoke.py --confcutdir=src/prism/tests
setenv =
    PYTHONPATH = {toxinidir}/src
basepython = python3.14


[testenv:smoke-lanes]
description = run src and fsrc smoke test environments as a convenience wrapper
package = skip
allowlist_externals =
    tox
commands =
    tox -e smoke-src-lane
    tox -e smoke-fsrc-lane


[testenv:lint-wave1-scopes]
description = run targeted lint checks for src and fsrc scopes (Wave 1 visibility)
deps =
    ruff==0.15.6
    black==25.1.0
commands =
    ruff check src/prism
    black --check src/prism


[testenv:typecheck-wave1-scopes]
description = run targeted src/fsrc mypy checks to make Wave 1 scope boundaries visible
allowlist_externals =
    sh
deps =
    mypy
commands =
    sh -c 'PYTHONPATH={toxinidir}/src mypy src/prism/scanner_core'
    sh -c 'PYTHONPATH={toxinidir}/src mypy src/prism/api.py src/prism/cli.py'
