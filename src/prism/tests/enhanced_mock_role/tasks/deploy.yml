---
# prism~runbook: if template render fails, manually copy /etc/app.conf.example to {{ mock_role_config_path }} and adjust owner/group
# prism~task: Deploy application template | warning: notifies Restart mock service — ensure handler is present
- name: Deploy application template
  ansible.builtin.template:
    src: app.conf.j2
    dest: "{{ mock_role_config_path }}"
    owner: "{{ mock_role_template_owner }}"
    group: "{{ mock_role_template_group }}"
    mode: "{{ mock_role_template_mode }}"
  notify: Restart mock service
  tags:
    - config

- name: Install environment file
  ansible.builtin.copy:
    src: mock-role.env
    dest: /etc/default/mock-role
    owner: root
    group: root
    mode: "0644"
  notify: Restart mock service

- name: Configure application ini settings with community.general
  community.general.ini_file:
    path: "{{ mock_role_config_path }}"
    section: settings
    option: "debug_enabled"
    value: "{{ mock_role_debug | default('false') }}"
    mode: "0644"
  tags:
    - config
  when: mock_role_configure_ini | default(false)

- name: Example undeclared external collection usage
  ansible.posix.synchronize:
    src: /tmp/source/
    dest: /tmp/dest/
    mode: push
  when: mock_role_use_undeclared_collection | default(false)
  tags:
    - sync
