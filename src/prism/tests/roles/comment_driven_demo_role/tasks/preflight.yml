# SPDX-License-Identifier: MIT-0
---
# prism~runbook:
# verify the service account exists before laying down files
# confirm release and current symlink parents are writable
- name: Ensure release root exists
  ansible.builtin.file:
    path: "{{ comment_demo_release_root }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

# prism~task: Create release directory | note: release directories are versioned so responders can inspect prior payloads
- name: Create release directory
  ansible.builtin.file:
    path: "{{ comment_demo_release_path }}"
    state: directory
    owner: "{{ comment_demo_service_user }}"
    group: "{{ comment_demo_runtime_group }}"
    mode: "0755"

# prism~task: Verify service account exists | runbook: if the service account is missing, coordinate with the base-image owner rather than creating a local snowflake account
- name: Verify service account exists
  ansible.builtin.command:
    cmd: "id {{ comment_demo_service_user }}"
  changed_when: false

# prism~task: Stage maintenance banner | warning: do not leave the banner deployed after validation completes
- name: Stage maintenance banner
  ansible.builtin.copy:
    src: maintenance-banner.txt
    dest: /etc/comment-demo/maintenance-banner.txt
    owner: root
    group: root
    mode: "0644"

# prism~task: Write release manifest | note: the artifact manifest gives reviewers a static input they can compare against the change request
- name: Write release manifest
  ansible.builtin.copy:
    dest: "{{ comment_demo_release_path }}/manifest.json"
    content: |
      {"release":"{{ comment_demo_release_version }}","owner":"platform","healthcheck":"{{ comment_demo_healthcheck_url }}"}
    owner: "{{ comment_demo_service_user }}"
    group: "{{ comment_demo_runtime_group }}"
    mode: "0644"
