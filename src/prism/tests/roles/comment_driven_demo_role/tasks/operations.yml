---
# prism~runbook: drain the node from external traffic before disruptive actions if this role is adapted for clustered services
- name: Announce maintenance mode
  ansible.builtin.debug:
    msg: "Entering maintenance mode for {{ comment_demo_service_name }}"

# prism~note: in real roles this often maps to a load balancer API or service registry update
- name: Mark node out of rotation
  ansible.builtin.command:
    cmd: /usr/local/bin/comment-demo-lb drain
  changed_when: true

# prism~note: explicit comments are useful here because task names like this tend to get copy-edited over time
- name: Record change window metadata
  ansible.builtin.copy:
    dest: /var/tmp/comment-demo-change-window.txt
    content: |
      release={{ comment_demo_release_version }}
      expected_version={{ comment_demo_expected_version }}
    mode: "0644"

# prism~runbook: place the node back in rotation only after validation tasks report success
- name: Mark node back in rotation
  ansible.builtin.command:
    cmd: /usr/local/bin/comment-demo-lb undrain
  changed_when: true
  when: comment_demo_enable_validation
