# This is a basic workflow to help you get started with Actions

name: CI
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
permissions:
  contents: write
# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    # run on pushes to any branch (including feature branches)
    # remove the branches filter so CI runs for feature branches too
    # (previously only triggered for "main")
    {}
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    # No temporary Node allow flags; using updated action versions instead

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.14

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .[dev]

      - name: "Lint: ruff"
        run: |
          pip install ruff
          ruff check .

      - name: "Format check: black"
        run: |
          pip install black
          black --check .

      - name: Setup reviewdog (for PR annotations)
        if: ${{ github.event_name == 'pull_request' }}
        uses: reviewdog/action-setup@v1
        with:
          version: latest

      - name: Run ruff and post annotations via reviewdog
        if: ${{ github.event_name == 'pull_request' }}
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Emit SARIF (supported by reviewdog) and post via reviewdog
          ruff check -- --format=sarif . > ruff.sarif || true
          cat ruff.sarif | reviewdog -f=sarif -name="ruff" -reporter=github-pr-review -level=error

      - name: Run tests
        run: pytest -q

  format:
    name: Auto-format and enforce pre-commit
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    permissions:
      contents: write
    # Auto-format job: rely on updated actions instead of temporary Node flags
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.14

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install pre-commit

      - name: Run pre-commit (auto-fix)
        run: |
          pre-commit run --all-files || true

      - name: Commit & push formatting changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: apply automatic formatting via pre-commit" || echo "No changes to commit"
            git push origin HEAD:${{ github.head_ref }}
            echo "Auto-formatted and pushed changes."
          else
            echo "No formatting changes needed."
          fi
