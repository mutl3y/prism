# This is a basic workflow to help you get started with Actions

name: CI
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
permissions:
  contents: write
# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    # run on pushes to any branch (including feature branches)
    # remove the branches filter so CI runs for feature branches too
    # (previously only triggered for "main")
    paths-ignore:
      - ".github/badges/**"
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - ".github/badges/**"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    # No temporary Node allow flags; using updated action versions instead

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.14

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .[dev]

      - name: "Lint: ruff"
        run: |
          pip install ruff
          ruff check .

      - name: "Format check: black"
        run: |
          pip install black
          black --check .

      - name: Setup reviewdog (for PR annotations)
        # if: ${{ github.event_name == 'pull_request' }}
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Run ruff and post annotations via reviewdog
        if: ${{ github.event_name == 'pull_request' }}
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Emit SARIF (supported by reviewdog) and post via reviewdog
          python -m ruff --version || true
          python -m ruff check --output-format=sarif --output-file=ruff.sarif . 2> ruff.err || true
          echo "---- ruff.sarif (start) ----"
          cat ruff.sarif || true
          echo "---- ruff.sarif (end) ----"
          echo "---- ruff.err (start) ----"
          cat ruff.err || true
          echo "---- ruff.err (end) ----"
          if [ -s ruff.sarif ]; then
            cat ruff.sarif | reviewdog -f=sarif -name="ruff" -reporter=github-pr-review -level=error
          else
            echo "No SARIF output from ruff; skipping reviewdog (see ruff.err)"
            exit 1
          fi

      - name: Run tests
        run: tox

      - name: Generate coverage badge
        if: ${{ github.event_name == 'push' }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET

          coverage_xml = Path("debug_readmes/coverage.xml")
          root = ET.parse(coverage_xml).getroot()
          pct = round(float(root.attrib.get("line-rate", "0")) * 100, 1)

          if pct >= 90:
              color = "#4c1"
          elif pct >= 80:
              color = "#97CA00"
          elif pct >= 70:
              color = "#a4a61d"
          elif pct >= 60:
              color = "#dfb317"
          elif pct >= 50:
              color = "#fe7d37"
          else:
              color = "#e05d44"

          label = "coverage"
          message = f"{pct:.1f}%"
          label_width = 74
          message_width = max(40, 10 * len(message) + 10)
          total_width = label_width + message_width

          svg = f'''<svg xmlns="http://www.w3.org/2000/svg" width="{total_width}" height="20" role="img" aria-label="{label}: {message}">
            <linearGradient id="s" x2="0" y2="100%">
              <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
              <stop offset="1" stop-opacity=".1"/>
            </linearGradient>
            <clipPath id="r">
              <rect width="{total_width}" height="20" rx="3" fill="#fff"/>
            </clipPath>
            <g clip-path="url(#r)">
              <rect width="{label_width}" height="20" fill="#555"/>
              <rect x="{label_width}" width="{message_width}" height="20" fill="{color}"/>
              <rect width="{total_width}" height="20" fill="url(#s)"/>
            </g>
            <g fill="#fff" text-anchor="middle" font-family="Verdana,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="11">
              <text aria-hidden="true" x="{label_width / 2}" y="15" fill="#010101" fill-opacity=".3">{label}</text>
              <text x="{label_width / 2}" y="14">{label}</text>
              <text aria-hidden="true" x="{label_width + message_width / 2}" y="15" fill="#010101" fill-opacity=".3">{message}</text>
              <text x="{label_width + message_width / 2}" y="14">{message}</text>
            </g>
          </svg>
          '''

          badge_path = Path(".github/badges/coverage.svg")
          badge_path.parent.mkdir(parents=True, exist_ok=True)
          badge_path.write_text(svg, encoding="utf-8")
          PY

      - name: Commit & push coverage badge
        if: ${{ github.event_name == 'push' }}
        run: |
          if [ -n "$(git status --porcelain .github/badges/coverage.svg)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/badges/coverage.svg
            git commit -m "docs: update coverage badge [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "Coverage badge already up to date."
          fi

  format:
    name: Auto-format and enforce pre-commit
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    permissions:
      contents: write
    # Auto-format job: rely on updated actions instead of temporary Node flags
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.14

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install pre-commit

      - name: Run pre-commit (auto-fix)
        run: |
          pre-commit run --all-files || true

      - name: Commit & push formatting changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: apply automatic formatting via pre-commit" || echo "No changes to commit"
            git push origin HEAD:${{ github.head_ref }}
            echo "Auto-formatted and pushed changes."
          else
            echo "No formatting changes needed."
          fi
