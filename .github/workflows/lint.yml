---
name: Lint

on:  # yamllint disable-line rule:truthy
  push: null
  pull_request: null

env:
  DEFAULT_BRANCH: main
  VALIDATE_ALL_CODEBASE: false
  FILTER_REGEX_EXCLUDE: >-
    (^|/)(docs/plan/|old_docs/|plugins/|\.codex$)
  VALIDATE_BIOME_FORMAT: false
  VALIDATE_BIOME_LINT: false
  VALIDATE_CHECKOV: false
  VALIDATE_CSS: false
  VALIDATE_CSS_PRETTIER: false
  VALIDATE_ENV: false
  VALIDATE_GITLEAKS: false
  VALIDATE_GITHUB_ACTIONS_ZIZMOR: false
  VALIDATE_HTML: false
  VALIDATE_HTML_PRETTIER: false
  VALIDATE_JAVASCRIPT_PRETTIER: false
  VALIDATE_JSCPD: false
  VALIDATE_JSON_PRETTIER: false
  VALIDATE_MARKDOWN: false
  VALIDATE_MARKDOWN_PRETTIER: false
  VALIDATE_NATURAL_LANGUAGE: false
  VALIDATE_PYTHON_BLACK: false
  VALIDATE_PYTHON_FLAKE8: false
  VALIDATE_PYTHON_ISORT: false
  VALIDATE_PYTHON_MYPY: false
  VALIDATE_PYTHON_PYLINT: false
  VALIDATE_PYTHON_RUFF_FORMAT: false
  VALIDATE_SPELL_CODESPELL: false
  VALIDATE_TYPESCRIPT_ES: false
  VALIDATE_TYPESCRIPT_PRETTIER: false
  VALIDATE_YAML_PRETTIER: false

jobs:
  build:
    name: Lint
    runs-on: ubuntu-latest

    permissions:
      # contents permission to clone the repository
      contents: read
      packages: read
      # issues and pull-requests permissions to write results as pull
      # request comments. Omit them if you don't need summary comments
      issues: write
      pull-requests: write
      # To report GitHub Actions status checks. Omit if you don't need
      # to update commit status
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          # super-linter needs the full git history to get the
          # list of files that changed across commits
          fetch-depth: 0
          persist-credentials: false

      - name: Super-linter
        # v8.6.0
        uses: super-linter/super-linter@9e863354e3ff62e0727d37183162c4a88873df41
        env:
          # To report GitHub Actions status checks
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  plugin-comment-highlighter:
    name: Plugin Comment Highlighter
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Install plugin dependencies
        working-directory: plugins/prism-comment-highlighter
        run: npm ci

      - name: Check plugin formatting
        working-directory: plugins/prism-comment-highlighter
        run: npm run format:check

      - name: Lint plugin sources
        working-directory: plugins/prism-comment-highlighter
        run: npm run lint

      - name: Typecheck plugin sources
        working-directory: plugins/prism-comment-highlighter
        run: npm run check

      - name: Test plugin
        working-directory: plugins/prism-comment-highlighter
        run: npm test
