name: prism

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run typecheck
        run: |
          tox -e typecheck

      - name: Run Wave 1 dual-scope lint checks
        run: |
          tox -e lint-wave1-scopes

      - name: Run Wave 1 dual-scope typecheck
        run: |
          tox -e typecheck-wave1-scopes

      - name: Run dual smoke lanes
        run: |
          tox -e smoke-lanes

  tests:
    runs-on: ubuntu-latest
    needs: quality-gates
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]
        ansible-core-version: ["2.17.*", "2.18.*", "2.19.*"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install "ansible-core==${{ matrix.ansible-core-version }}"

      - name: Run tests
        run: |
          python -m pytest -q --cov=src/prism --cov-report=xml:debug_readmes/coverage.xml --cov-fail-under=65

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Generate role docs
        run: |
          prism role src/prism/tests/roles/enhanced_mock_role --fail-on-yaml-like-task-annotations -o README.generated.md

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: generated-readme
          path: README.generated.md
