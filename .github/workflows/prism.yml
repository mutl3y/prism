name: prism

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  plan-governance-guardrail:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate plan package governance artifacts
        run: |
          set -euo pipefail
          python - <<'PY'
          import re
          from pathlib import Path

          plan_path = Path("docs/plan/pure-execution-core-plugin-architecture-20260413/plan.yaml")
          contract_path = Path("docs/plan/pure-execution-core-plugin-architecture-20260413/artifacts/contract_matrix.yaml")
          if not plan_path.is_file():
            raise SystemExit(f"missing plan artifact: {plan_path}")
          if not contract_path.is_file():
            raise SystemExit(f"missing contract artifact: {contract_path}")

          plan_text = plan_path.read_text(encoding="utf-8")
          contract_text = contract_path.read_text(encoding="utf-8")

          if not re.search(r"^plan_id:\s+pure-execution-core-plugin-architecture-20260413$", plan_text, re.MULTILINE):
            raise SystemExit("plan_id mismatch for governance plan")
          for required_plan_key in ("canonical_authority:", "reject_closure_matrix:"):
            if required_plan_key not in plan_text:
              raise SystemExit(f"missing required plan key: {required_plan_key}")

          expected_reject_ids = {f"REJECT-{index:03d}" for index in range(1, 6)}
          reject_ids = set(re.findall(r"reject_id:\s*(REJECT-\d+)", plan_text))
          if reject_ids != expected_reject_ids:
            raise SystemExit(
              "reject_closure_matrix reject_id set mismatch: "
              f"expected={sorted(expected_reject_ids)} actual={sorted(reject_ids)}"
            )

          row_pattern = re.compile(
            r"-\s+reject_id:\s*(REJECT-\d+)\n"
            r"(?:\s{4,}.+\n)*?"
            r"\s+file_target:\s*(.+)\n"
            r"(?:\s{4,}.+\n)*?"
            r"\s+expected_evidence_artifact:\s*(.+)",
            re.MULTILINE,
          )
          rows = {
            match.group(1): {
              "file_target": match.group(2).strip(),
              "expected_evidence_artifact": match.group(3).strip(),
            }
            for match in row_pattern.finditer(plan_text)
          }
          missing_rows = sorted(expected_reject_ids - set(rows))
          if missing_rows:
            raise SystemExit(f"missing reject row mappings: {missing_rows}")

          contract_artifact = "docs/plan/pure-execution-core-plugin-architecture-20260413/artifacts/contract_matrix.yaml"
          reject_002 = rows["REJECT-002"]
          if reject_002["file_target"] != contract_artifact:
            raise SystemExit("REJECT-002 file_target must point to contract_matrix.yaml")
          if reject_002["expected_evidence_artifact"] != contract_artifact:
            raise SystemExit("REJECT-002 expected_evidence_artifact must point to contract_matrix.yaml")

          reject_003_target = rows["REJECT-003"]["file_target"]
          if "design.md" not in reject_003_target:
            raise SystemExit("REJECT-003 file_target must include design.md")

          reject_004_target = rows["REJECT-004"]["file_target"]
          if ".github/workflows/prism.yml" not in reject_004_target:
            raise SystemExit("REJECT-004 file_target must include .github/workflows/prism.yml")

          required_contract_sections = {
              "strict_non_strict_failure_contract",
              "risk_to_test_assertion_mapping",
              "plugin_selection_determinism",
              "policy_context_governance",
          }
          missing_sections = [key for key in required_contract_sections if f"{key}:" not in contract_text]
          if missing_sections:
            raise SystemExit(f"contract_matrix missing required sections: {missing_sections}")

          # Enforce non-empty sections for list-mapped contract definitions.
          non_empty_list_sections = {
            "strict_non_strict_failure_contract",
            "risk_to_test_assertion_mapping",
          }
          for section in non_empty_list_sections:
            section_match = re.search(rf"^{section}:\n(?P<body>(?:^[ \t].*\n)*)", contract_text, re.MULTILINE)
            if not section_match:
              raise SystemExit(f"unable to parse section body for {section}")
            body = section_match.group("body")
            if "- " not in body:
              raise SystemExit(f"section {section} must contain at least one mapping row")

          # Enforce non-empty top-level mapping sections.
          non_empty_mapping_sections = {
            "plugin_selection_determinism",
            "policy_context_governance",
          }
          for section in non_empty_mapping_sections:
            section_match = re.search(rf"^{section}:\n(?P<body>(?:^[ \t].*\n)*)", contract_text, re.MULTILINE)
            if not section_match:
              raise SystemExit(f"unable to parse section body for {section}")
            if not section_match.group("body").strip():
              raise SystemExit(f"section {section} must be non-empty")

          print("Validated governance artifacts and exact reject mapping integrity.")
          PY

  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run typecheck
        run: |
          tox -e typecheck

      - name: Run Wave 1 dual-scope lint checks
        run: |
          tox -e lint-wave1-scopes

      - name: Run Wave 1 dual-scope typecheck
        run: |
          tox -e typecheck-wave1-scopes

      - name: Run dual smoke lanes
        run: |
          tox -e smoke-lanes

  tests:
    runs-on: ubuntu-latest
    needs: quality-gates
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]
        ansible-core-version: ["2.17.*", "2.18.*", "2.19.*"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install "ansible-core==${{ matrix.ansible-core-version }}"

      - name: Run tests
        run: |
          python -m pytest -q --cov=src/prism --cov-report=xml:debug_readmes/coverage.xml --cov-fail-under=65

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Generate role docs
        run: |
          prism role src/prism/tests/roles/enhanced_mock_role --fail-on-yaml-like-task-annotations -o README.generated.md

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: generated-readme
          path: README.generated.md
