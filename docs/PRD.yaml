prd_id: prism-unified-src-plugin-architecture-20260422
version: 6.0.0
status: active

user_stories:
  - as_a: ansible role author
    i_want: prism to scan my role and generate a complete, accurate README
    so_that: my role is self-documenting with minimal manual effort
  - as_a: collection maintainer
    i_want: prism to scan all roles in a collection and produce collection-level documentation
    so_that: downstream users can browse the whole collection from one artifact
  - as_a: platform engineer
    i_want: prism to support multiple Ansible platforms (Ansible, Kubernetes, Terraform)
    so_that: I can apply the same documentation workflow across my infrastructure stack
  - as_a: prism maintainer
    i_want: a single, canonical src/prism/ codebase with a registry-driven plugin architecture
    so_that: platform support can be added or removed without touching scanner core

scope:
  in_scope:
    - single unified src/prism/ codebase (fsrc migration complete as of 2026-04-22)
    - plugin-registry-driven DI -- platform plugins resolve via PluginRegistry, not hardcoded imports
    - pure scanner_core -- no Ansible-specific logic in scanner_core or scanner_extract
    - scanner_plugins.ansible as the canonical Ansible implementation
    - scanner_plugins.defaults as the canonical plugin wiring surface
    - collection scanning and collection-level report rendering
    - CLI and API surfaces (cli.py, api.py) unchanged for consumers
    - policy-as-code audit plugin layer (stub artefacts landed, wave 1 deferred)
    - CI gate: pytest -q + ruff check src/ + black --check src/ + tox -e typecheck
  out_of_scope:
    - Kubernetes and Terraform scanner plugin implementations (architecture ready; plugins not yet implemented)
    - feedback.py / --feedback-from-learn integration (MG-03/MG-09 -- redesigned as Policy as Code audit plugin)
    - prism-learn integration tests (separate repo)

acceptance_criteria:
  - criterion: Single unified src/prism/ codebase
    verification: No fsrc/ or _src_retired/ directories exist; all tests run from src/prism/tests/
  - criterion: Plugin architecture enforced in scanner_core
    verification: Zero Ansible-specific imports in scanner_core; DI resolves via PluginRegistry
  - criterion: All tests pass
    verification: pytest -q from src/prism/tests/ reports 0 failures (506 passed, 6 skipped as of 2026-04-22)
  - criterion: Lint and typecheck clean
    verification: ruff check src/ and black --check src/ and tox -e typecheck all pass
  - criterion: CLI and API surfaces unchanged
    verification: api.py and cli.py public signatures preserved; existing consumers unaffected

features:
  - name: Single unified src/ codebase
    overview: >
      Completed fsrc->src migration (2026-04-22). The fsrc/src/prism/ experimental lane has been
      promoted as the single source of truth. The legacy src/ lane (_src_retired) is deleted.
      All tests, CI, tox, and demo scripts now target src/ only.
    status: complete

  - name: Plugin-registry-driven DI
    overview: >
      DIContainer resolves platform plugins through PluginRegistry instead of hardcoded imports.
      Zero Ansible imports remain in scanner_core or scanner_extract.
    status: complete

  - name: Pure scanner_core
    overview: >
      scanner_core owns only generic classifier and routing primitives. Ansible-specific logic
      lives exclusively in scanner_plugins.ansible. Supported Ansible target seeds, repo
      role-shape heuristics, and kernel runtime resolution are composed from scanner_plugins.defaults.
    status: complete

  - name: scanner_plugins.ansible
    overview: >
      Canonical Ansible implementation: AnsibleVariableDiscoveryPlugin, AnsibleFeatureDetectionPlugin,
      AnsibleScannerPlugin. Replaces scattered Ansible logic previously in scanner_core and scanner_extract.
    status: complete

  - name: Policy as Code audit plugin layer
    overview: >
      Wave 1 complete: rule loader (YAML/JSON), BuiltinAuditPlugin orchestrator
      dispatching by rule.id, CLI hook in role + collection handlers attaching
      AuditReport to scan payload, --fail-on-audit-violations exits with
      EXIT_CODE_AUDIT_VIOLATIONS (2) on any error-severity violation. Three
      builtin rule classes (no-shell-without-runbook, runbook-coverage-min,
      dependency-compliance) remain stubs requiring scanner_config payload
      additions; unimplemented evaluators surface as warning-severity
      violations rather than silent skips. --feedback-from-learn flag retired.
    status: complete

  - name: Collection scanning and rendering
    overview: >
      scan_collection() API and collection-level markdown/JSON report rendering. Collection
      compatibility shims remain in prism.api and prism.cli; canonical ownership in
      api_layer/collection.py and cli_app/commands.py.
    status: complete

  - name: Multi-platform plugin protocols
    overview: >
      Platform expansion readiness gate passed (2026-04-19). Protocol and registry seams are
      in place for Kubernetes and Terraform plugin implementations. No K8s/Terraform plugins
      yet implemented -- expansion planning can proceed.
    status: ready_for_expansion

errors:
  - code: LEGACY_SECTION_CONFIG_UNSUPPORTED
    message: "Legacy section config file `.ansible_role_doc.yml` is no longer supported. Rename or migrate to `.prism.yml`."
    when: Triggered when legacy section config is detected in user-provided role content.
  - code: LEGACY_RUNTIME_PATH_UNAVAILABLE
    message: Legacy ansible_role_doc compatibility path has been retired. Use canonical Prism behavior.
    when: Triggered when a user-facing command or input requests a retired legacy mode.

decisions:
  - decision: fsrc/ experimental lane promoted to canonical src/ (2026-04-22)
    rationale: >
      The fsrc lane had the correct architecture (pure scanner_core, plugin registry, registry-driven DI).
      Rather than continue dual-lane maintenance, it was promoted as the single source of truth and the
      old src/ lane deleted.
  - decision: Plugin architecture uses PluginRegistry, not hardcoded imports
    rationale: Allows platform plugins to be added or removed without changing scanner_core.
  - decision: feedback.py / MG-03 / MG-09 deliberately excluded from migration
    rationale: Being redesigned as Policy as Code audit plugin. Stub layer landed; full implementation deferred.
  - decision: Policy as Code uses 'passed:bool' not 'pass:bool' in AuditReport TypedDict
    rationale: "'pass' is a Python reserved keyword; 'passed' preserves intent without SyntaxError."

