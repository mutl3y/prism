plan_id: scanner-hardening-dayplan-20260401
objective: Deliver a one-day execution plan and sequencing map to remediate 20 validated scanner security/stability findings with strict quality gates.
created_at: "2026-04-01T00:00:00Z"
created_by: gem-planner
status: completed
research_confidence: medium

plan_metrics:
  wave_1_task_count: 4
  total_dependencies: 13
  risk_score: high

tldr: |
  One-day hardening plan prioritizes security and crash-class defects first, then behavior
  consistency and model hygiene, then test amplification and full validation gates.
  Highest risk-reduction first: XSS, integrity checks, unchecked JSON assumptions,
  path/symlink crashers, and exception swallowing that hides scan failures.

open_questions:
  - Should HTTPS->SSH rewrite remain default with explicit opt-out, or flip to opt-in SSH-only behavior?
  - Should remote policy integrity support pinning by SHA256 only, or SHA256 plus optional signature workflow?
  - For collection scans, should any single-role fatal exception fail the whole collection scan when strict mode is enabled?

answers:
  - HTTPS->SSH rewrite will be opt-in via explicit transport policy to avoid breaking existing workflows relying on implicit rewrite, with a compatibility mode and warnings for migration.
  - Remote policy integrity will support SHA256 pinning as the primary mechanism, with optional future support for signature verification if needed.
  - For collection scans, we will classify exceptions at the role level and allow scan continuation by default, with an optional strict mode that can fail the whole collection scan on any single-role fatal exception if users want that behavior.

pre_mortem:
  overall_risk_level: high
  critical_failure_modes:
    - scenario: Hardening changes alter repo clone behavior and break existing automation relying on implicit SSH rewrite.
      likelihood: medium
      impact: high
      mitigation: Introduce explicit transport policy setting with compatibility default and migration warning tests.
    - scenario: Path normalization guards suppress legitimate failures, reducing visibility into malformed role content.
      likelihood: medium
      impact: high
      mitigation: Standardize typed failure payloads with explicit error codes instead of silent suppression.
    - scenario: Exception narrowing misses real parser/runtime failures, causing partial scans and silent data loss.
      likelihood: medium
      impact: critical
      mitigation: Define exception taxonomy and role-level failure classification matrix before implementation.
  assumptions:
    - Existing strict gate remains required: ruff, mypy/typecheck, focused pytest per wave, full pytest final.
    - No public API signature changes are required to implement all findings.
    - One-day execution means phased merges with wave gates, not a single risky batch.

implementation_specification:
  code_structure: Keep seam-first changes within canonical modules (repo_services, scanner_config, scanner_io, api, scanner_extract/scanner_core/scanner_analysis), adding minimal shared helpers for safe-path and exception classification contracts.
  affected_areas:
    - src/prism/repo_services.py
    - src/prism/scanner_config/patterns.py
    - src/prism/scanner_config/style.py
    - src/prism/scanner_config/readme.py
    - src/prism/scanner_config/marker.py
    - src/prism/scanner_io/output.py
    - src/prism/scanner_io/loader.py
    - src/prism/scanner_extract/dataload.py
    - src/prism/scanner_io/emit_output.py
    - src/prism/api.py
    - src/prism/scanner_core/scan_facade_helpers.py
    - src/prism/collection_plugins.py
    - src/prism/scanner_analysis/metrics.py
    - src/prism/tests/
  component_details:
    - component: Transport policy controls
      responsibility: Make repo URL scheme handling explicit and testable without forced implicit rewrite side effects.
      interfaces:
        - clone_repo transport policy input contract
        - CLI/API repo-scan compatibility behavior tests
    - component: Safe path normalization
      responsibility: Prevent ValueError crashes for out-of-root symlinks while preserving actionable failure metadata.
      interfaces:
        - role-relative path helper returning safe relpath or classified outside-root marker
        - YAML parse failure payload contract
    - component: Loader and parser exception policy
      responsibility: Replace broad swallowing with typed, bounded exception handling and warning/error propagation.
      interfaces:
        - config loader warning/error contract
        - collection role failure classification codes
    - component: Output safety and immutability
      responsibility: Escape HTML title, narrow markdown fallback catches, avoid metadata mutation side effects.
      interfaces:
        - render_final_output/output HTML safety contract
        - emit_output metadata copy-on-write behavior
    - component: Evidence scoring and fallback typing
      responsibility: Make scoring model explainable/configurable and normalize fallback semantic types.
      interfaces:
        - test_evidence_probability policy contract
        - collection plugin fallback type contract
  dependencies:
    - component: Output safety and immutability
      relationship: Depends on loader/parser exception policy to ensure consistent failure metadata during render paths.
    - component: Test amplification
      relationship: Depends on all remediation components to lock regression coverage for each finding.
  integration_points:
    - API wrappers: scan_role and scan_collection error boundaries and payload normalization.
    - Scanner I/O: output rendering and sidecar emission path.
    - Config loaders: pattern/readme/style/marker loading.
    - Repo intake: clone/fetch transport and metadata normalization.

contracts:
  - from_task: T1
    to_task: T7
    interface: Security remediation acceptance matrix for findings 4, 11, 15.
    format: Finding IDs -> expected behavior -> focused test IDs
  - from_task: T2
    to_task: T7
    interface: Safe-path normalization contract for findings 3, 5, 6.
    format: Path input class -> expected relpath/error payload schema
  - from_task: T3
    to_task: T7
    interface: Exception taxonomy and failure-code mapping for findings 7, 8, 9, 14, 19, 20.
    format: Exception type -> failure code -> user-visible message policy
  - from_task: T4
    to_task: T7
    interface: Transport policy migration behavior for findings 1, 16.
    format: URL type x policy mode -> clone URL + warning behavior
  - from_task: T5
    to_task: T7
    interface: Output immutability and deduped loader behavior for findings 10, 12.
    format: Input metadata/display title config -> deterministic output contract
  - from_task: T6
    to_task: T7
    interface: Scoring and fallback typing policy for findings 17, 18.
    format: Evidence/fallback input -> typed score/type output

