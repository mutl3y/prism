execution_policy:
  change_unit: small dependency-ordered slices with explicit evidence at each closure point
  commit_template: "arch-final(<wave_id>/<task_id>): <short outcome>"
  priority_rules:
    - Prefer removing implicit state and implicit wiring over additional package proliferation.
    - Prefer shrinking hotspot modules by responsibility, not by arbitrary line-count goals.
    - Avoid churn in already-thin shells unless it removes genuine coupling or test fragility.
    - Prefer direct imports from canonical contract-owner modules inside internal code.
    - Treat umbrella compatibility modules as public surfaces first, not default internal dependencies.
    - When introducing packages for api, cli, or repo internals, preserve the current top-level modules as thin stable shims.
  telemetry:
    - Track scanner.py, cli_commands.py, variable_extractor.py, guide.py, and test hotspot sizes as non-blocking telemetry.
    - Track number of alias-identity tests retired from API/CLI coverage.

implementation_specification:
  architecture_targets:
    - target: scanner.py
      desired_state: public facade that validates inputs, resolves request-scoped policy/config, and delegates through explicit runtime seams
    - target: api.py
      desired_state: public adapter that remains as a stable shim while internals move toward a cohesive api package without stringly intermediate contracts
    - target: cli.py plus cli_commands.py
      desired_state: thin CLI shell plus focused command modules, likely under a cli package, with reduced cross-module compatibility clutter
    - target: repo_services.py plus repo modules
      desired_state: public repo facade that remains as a stable shim while repo internals converge behind cohesive package-owned services
    - target: scanner_extract/variable_extractor.py
      desired_state: focused extraction helpers with request-scoped policy usage and narrower exception swallowing
    - target: scanner_readme/guide.py
      desired_state: planning/composition logic separated from section formatting helpers
    - target: tests and docs
      desired_state: behavior-first acceptance coverage and architecture docs that describe the current reality only
  boundary_rules:
    - Internal modules should import domain-owned contract modules directly when no compatibility role is intended.
    - Umbrella re-export modules such as scanner_data/contracts.py should be treated primarily as public or compatibility surfaces.
    - Package moves for api, cli, and repo should preserve api.py, cli.py, and repo_services.py as thin stable top-level shims.
  affected_areas:
    - src/prism/scanner.py
    - src/prism/api.py
