  key_findings:
    - scanner_data/contracts.py is already a small curated re-export surface, so the former contracts god-file issue is largely closed.
    - cli.py is already acting as a shell; the remaining CLI hotspot has moved into cli_commands.py.
    - repo_services.py is already compact and cohesive enough that it no longer deserves top billing as a refactor hotspot.
