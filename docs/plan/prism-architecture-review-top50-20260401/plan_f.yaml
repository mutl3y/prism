current_state_findings:
  - finding_id: FF1
    severity: high
    summary: api.py now has an explicit seam register separating stable entrypoints from retained compatibility seams.
    evidence:
      - src/prism/api.py defines API_PUBLIC_ENTRYPOINTS, API_SHARED_REPO_COMPATIBILITY_SEAMS, API_RETAINED_PATCHABLE_SEAMS, and API_TRANSITIONAL_COMPATIBILITY_SEAMS.
      - src/prism/tests/test_api.py now verifies the documented seam register exists on the facade.
    implication: Future API cleanup can distinguish intentional compatibility from retirement candidates without rediscovering the surface ad hoc.

  - finding_id: FF2
    severity: high
    summary: CLI ownership is now consolidated under cli_app/, and cli.py no longer depends on extra top-level CLI helper modules.
    evidence:
      - src/prism/cli_app/presenters.py and src/prism/cli_app/runtime.py now hold canonical presenter/runtime ownership.
      - cli.py now delegates parser and presenter behavior directly to cli_app modules.
    implication: New CLI extension work now has one clear default home inside cli_app/ without competing top-level helper files.

  - finding_id: FF3
    severity: medium
    summary: repo_services.py is now explicitly frozen as the canonical shared repo facade over a packaged repo_layer implementation.
    evidence:
      - src/prism/repo_services.py defines REPO_SERVICE_CANONICAL_SURFACE and REPO_SERVICE_COMPATIBILITY_SEAMS.
      - src/prism/repo_layer/intake.py and src/prism/repo_layer/metadata.py now own repo clone/workspace and metadata logic.
      - src/prism/tests/test_repo_services.py verifies the documented canonical surface exists.
    implication: Shared repo orchestration now has a documented boundary that API and CLI facades can defer to consistently.

  - finding_id: FF4
    severity: medium
    summary: Monkeypatch seams were retained deliberately and recorded rather than left implicit.
    evidence:
      - src/prism/tests/test_api.py and src/prism/tests/test_cli_repo.py continue to use facade-level monkeypatch seams where the public compatibility contract intentionally allows it.
      - docs/dev_docs/architecture.md now documents the explicit seam-register rule for api.py, cli.py, and repo_services.py.
    implication: Future removals now require an explicit seam-retirement decision instead of incidental refactoring.

  - finding_id: FF5
    severity: low
    summary: The package split now matches the top-level filesystem shape rather than relying on extra wrapper modules.
    evidence:
      - Source search no longer finds active top-level cli_commands.py, cli_presenters.py, repo_intake.py, or repo_metadata.py modules.
      - Architecture guardrails now cover repo_layer reverse imports in addition to api_layer and cli_app checks.
    implication: The remaining top-level surface is easier to reason about and less likely to attract new extension work into the wrong location.

recommended_target_shape:
  stable_facades:
    - src/prism/api.py
    - src/prism/cli.py
    - src/prism/repo_services.py
  package_owned_internals:
    - src/prism/api_layer
    - src/prism/cli_app
    - src/prism/repo_layer
  finalization_rule: |
    Keep api.py, cli.py, and repo_services.py as the only stable top-level facades in
    this lane. Any remaining helper that is still intended for extension or internal
    evolution should live under api_layer/, cli_app/, or repo_layer/, or be wrapped by a
    clearly documented compatibility seam with an explicit retention decision.
  compatibility_register_expectation:
    - Enumerate which api.py names are intentionally patchable/public compatibility seams.
    - Enumerate which cli.py names are intentionally patchable/public compatibility seams.
    - Enumerate which repo_services.py names are the canonical shared repo facade.
    - Treat undocumented alias exports as retirement candidates, not permanent surface area.

strategic_decision:
  decision: Treat package-split finalization as a seam-curation and ownership-consolidation effort, not another extraction wave.
  rationale:
    - Extraction and reverse-import control are already complete enough to support package-oriented extension work.
    - The remaining risk is ambiguity: too many facade-level aliases, duplicate wrapper ownership, and unclear permanence of monkeypatch seams.
    - A finalization plan should reduce that ambiguity before more feature work accumulates on top of the transitional layout.
  success_definition:
    - api.py, cli.py, and repo_services.py each have a documented, intentionally small compatibility surface.
    - cli_app/, api_layer/, and repo_layer/ are the default homes for new extension work without competing top-level helper ownership.
    - Remaining compatibility seams are explicit and tested as curated contracts.
    - The full closure bundle passes together: pytest, ruff, black --check, and tox -e typecheck.

execution_policy:
  change_unit: small closure-oriented slices with explicit seam-retention decisions
  commit_template: "arch-finalize(<wave_id>/<task_id>): <short outcome>"
  priority_rules:
    - Decide seam ownership before deleting or moving compatibility exports.
    - Prefer one canonical ownership location per behavior; avoid leaving extra top-level helper modules beside the facades.
    - Preserve documented monkeypatch seams until an explicit retirement task removes them.
    - Do not change public entrypoint names unless the canonical register is updated first.
  telemetry:
    - Track line counts for api.py, cli.py, and repo_services.py.
    - Track count of documented compatibility seams in api.py, cli.py, and repo_services.py.
    - Track count of top-level helpers whose canonical ownership remains outside api_layer/, cli_app/, or repo_layer/.

