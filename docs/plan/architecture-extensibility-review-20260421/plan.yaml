      user provided docs/dev_docs/scan-performance-baseline-20260404.md as possible benchmark source; need to extract concrete scenarios and metrics from it.
    work_items:
      - "pytest-benchmark suite: single-file parse, small role scan, large role scan"
      - "CI records results as artifacts (not pass/fail initially)"
      - "Set budget thresholds after baseline established"
    acceptance:
      - "Benchmark CI artifact uploaded on every PR"
    estimated_effort: small
    depends_on: []

  - id: T4-02
    title: "Promote _run_scan_payload to public seam"
    status: not_started
    severity: medium
    supersedes: [E01]
    summary: |
      api.py imports _run_scan_payload from scanner.py. Public surface should
      not depend on private internals.
    work_items:
      - "Define proper public seam in scanner_kernel"
      - "api.py imports from scanner_kernel"
      - "Remove the private function from scanner.py"
    acceptance:
      - "No prism.api -> prism.scanner._private imports"
    estimated_effort: small
    depends_on: []

  - id: T4-03
    title: "CLI streaming progress output"
    status: not_started
    severity: low
    supersedes: [E03]
    summary: |
      CLI shows nothing during long scans. Use phase events (T3-01) to
      stream progress to stderr.
    work_items:
      - "Progress reporter consumes T3-01 events"
      - "CLI flag: --progress / --no-progress"
      - "Stream to stderr to keep stdout JSON-clean"
    acceptance:
      - "Long scans show phase-by-phase progress on stderr"
    estimated_effort: trivial
    depends_on: [T3-01]

  - id: T4-04
    title: "Property/fuzz testing for YAML and Jinja parsers"
    status: not_started
    severity: low
    supersedes: [F03]
    summary: |
      Prism parses arbitrary user-controlled YAML and Jinja from roles.
      Add hypothesis-based property tests.
    work_items:
      - "hypothesis property tests for YAML parsing edge cases"
      - "hypothesis property tests for Jinja template scanning"
      - "Focus: nested structures, unicode, very large files, circular refs"
    acceptance:
      - "Hypothesis test suite green; CI runs default profile"
    estimated_effort: small
    depends_on: []

  - id: T4-05
    title: "Jinja2 sandbox audit"
    status: not_started
    severity: low
    supersedes: [H02]
    summary: |
      Confirm role content is never used as Jinja template source (data
      context only). Use SandboxedEnvironment where any role content reaches
      a template path.
    work_items:
      - "Audit all Jinja Environment instantiations for autoescape + sandbox config"
      - "Switch to SandboxedEnvironment where role content is evaluated"
    acceptance:
      - "Audit findings documented; no unsandboxed evaluation of role content"
    estimated_effort: small
    depends_on: []

  - id: T4-06
    title: "PRISM_* environment variable support"
    status: not_started
    severity: low
    supersedes: [D02]
    summary: |
      Add env-var configuration layer for container/CI use. Lower priority
      than explicit API/CLI options.
    work_items:
      - "Define PRISM_* env namespace"
      - "Wire through ScanOptionsSchema (T2-02)"
    acceptance:
      - "Env-var configuration documented and tested"
    estimated_effort: trivial
    depends_on: [T2-02]

