    scan_context.py is imported 5x. Risk: changes cascade. Mitigation:
    - Keep scan_context stable (TypedDict definitions only, no logic)
    - Move payload builders into separate module if scan_context grows
    - Pin scan_context API in contracts (no breaking changes)

  callback_injection_risk: |
    12 callback injection points. Risk: hard to trace data flow. Mitigation:
    - Replace with DI container; explicit wiring
    - Document callback signatures (InputType→OutputType)
    - Move callbacks to strategy pattern (e.g., OutputStrategy interface)

  circular_dependency_risk: |
    5 circular dependencies identified. Risk: import order issues, tests fail.
    Mitigation:
    - Break cycles in task_1_1 (move constants to shared module)
    - Verify import graph with static analyzer per commit
    - No reverse imports allowed (submodules never import scanner.py)

