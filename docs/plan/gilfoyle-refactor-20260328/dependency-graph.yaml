circular_dependency_risks:
  cycle_1:
    - "variable_extractor.py → task_parser.py → variable_extractor.py??"
    - description: "variable_extractor calls _collect_register_names (in itself), task_parser needs task detection"
    - severity: low
    - breakpoint: "Extract task detection to shared module; both import from it"

  cycle_2:
    - "task_parser.py → variable_extractor.py (for SECRET_NAME_TOKENS)"
    - "variable_extractor.py → task_parser.py??"
    - description: "Shared secret/credential definitions"
    - severity: medium
    - breakpoint: "Move token definitions to scanner_data/contracts or constants module"

  cycle_3:
    - "render_reports.py imports scan_context.py"
    - "scan_context.py (indirectly via function signatures) needs render_reports functions"
    - description: "Metadata builders and report functions; not actual code cycle, but design smell"
    - severity: low
    - breakpoint: "render_reports.py should not be imported by scanner.py; only called via callback"

  cycle_4:
    - "scanner_errorhandling.py → task_parser.py"
    - "task_parser.py → scanner_errorhandling.py?? (for error collection)"
    - description: "Error handling for task parsing; not a hard cycle, but tight coupling"
    - severity: low
    - breakpoint: "task_parser exports errors; scanner_errorhandling just consumes them"

  cycle_5:
    - "scanner.py imports 60+ submodules with aliased names (e.g., _scan_context_*)"
    - "submodules do NOT import scanner.py (no reverse imports)"
    - description: "Not a cycle, but scanner is tightly coupled to all submodules"
    - severity: high
    - breakpoint: "This is exactly the god_module problem; solution is to extract orchestrators"

callback_injection_points:
  injection_1:
    function: "scanner.py:_render_and_write_scan_output"
    line: 2463
    injects: ["render_readme", "render_final_output", "write_output"]
    target: "scan_output_primary.render_and_write_scan_output"
    reason: "scan_output_primary doesn't import render_readme (avoid circular dep)"
    mitigation: "OutputOrchestrator replicates logic; no injection needed"

  injection_2:
    function: "scanner.py:_emit_scan_outputs"
    line: 2971
    injects: ["_build_scanner_report_markdown", "render_runbook", "render_runbook_csv"]
    target: "scan_output_emission.emit_scan_outputs"
    reason: "scan_output_emission doesn't import render_reports/runbook (avoid circular)"
    mitigation: "OutputOrchestrator owns rendering; emits directly"

  injection_3:
    function: "scanner.py:_build_scanner_report_markdown"
    line: 2074
    injects: ["_render_guide_section_body"]
    target: "scanner_report.build_scanner_report_markdown"
    reason: "Avoid circular dep scanner_report ← render_guide ← scanner_report"
    mitigation: "Extract strategy for section rendering; inject via FeatureContext"

  injection_4:
    function: "scanner.py:_write_optional_runbook_outputs"
    line: 2273
    injects: ["render_runbook", "render_runbook_csv"]
    target: "scan_output_emission.write_optional_runbook_outputs"
    reason: "Same as injection_2"
    mitigation: "OutputOrchestrator handles runbook writing"

  injection_5:
    function: "scanner.py:_render_primary_scan_output"
    line: 2952
    injects: ["render_readme_callback"]
    target: "scan_output_primary.render_primary_scan_output"
    reason: "Primary output adapts scanner-level render contract"
    mitigation: "Direct integration; no DI needed"

  injection_6:
    function: "scanner.py:_iter_task_include_targets"
    line: 156 (imported from task_parser)
    injects: ["_resolve_task_include (closure over role_path)"]
    target: "task_parser internal"
    reason: "Task resolution closure captures role context"
    mitigation: "Pass role_path as explicit parameter"

  injection_7:
    function: "scanner.py main"
    line: 2990+
    injects: ["all 60 submodule functions"]
    target: "run_scan orchestration"
    reason: "Imported at module level; acts as god coordin..."
    mitigation: "DI container wires dependencies at startup"

  injection_8:
    function: "scanner_report.py:build_scanner_report_markdown"
    line: 428
    injects: ["render_section_body callback"]
    target: "internal section rendering"
    reason: "Injected from scanner.py via _build_scanner_report_markdown wrapper"
    mitigation: "Extract render_section_body strategy; pass via data contract"

