tldr: |
  **Objective:** Eliminate `scanner.py` god_module and 26 scattered submodules; replace them with
  3-4 focused orchestrator classes, proper DI, immutable data pipelines, and 6-8 consolidated module groups.

  **Approach:** 5-wave refactoring maintaining zero test failures and 0 mypy errors throughout.
  - Wave 1 (Foundational): Data contracts, DI design, dependency mapping [PARALLEL]
  - Wave 2 (Core Extraction): ScannerContext, VariableDiscovery, OutputOrchestrator, FeatureDetector
  - Wave 3 (Consolidation): Group 26 submodules into variable/output/config/util cohorts
  - Wave 4 (Immutability): Builder/Strategy patterns for procedural mutations
  - Wave 5 (Testing): Granularize 768 integration tests into focused unit tests

  **Safety:** Maintain public API (api.py, cli.py), TypedDict contracts, mypy compliance,
  and backwards-compatible behavior throughout all phases.

  **Key Milestones:**
  1. DI container operational (Wave 1)
  2. First orchestrator class extracted (Wave 2)
  3. All 4 core classes extracted (Wave 2)
  4. Submodule consolidation complete (Wave 3)
  5. Immutable pipelines validated (Wave 4)
  6. Unit tests written/validated (Wave 5)

  **Estimated Effort:** 200-240 hours (5-6 weeks at 40 hrs/wk, accounting for testing/validation)

open_questions:
  - Should DI container be hand-crafted class or use existing framework (e.g., dependency_injector)?
  - Should we target 6-8 submodule groups or allow 8-10 for clearer separation?
  - Should Variable/Role/Task data classes be frozen (immutable) or use defensive copying?
  - Should builder pattern use fluent interface or traditional builder?
  - Which integration tests should be entirely replaced vs. augmented with unit tests?

pre_mortem:
  overall_risk_level: high

  critical_failure_modes:
    - scenario: "Circular dependencies introduced during extraction"
      likelihood: high
      impact: critical
      mitigation: |
        Implement strict test: any submodule importing scanner.py fails build.
        Use import-checker linter (e.g., flake8-forbidden-imports) to prevent.
        Design DI layer first; all extracted classes depend DOWN only (on data contracts,
        submodules) not UP (on scanner.py or each other in cycles).

    - scenario: "Test failures during refactoring due to mutable state."
      likelihood: high
      impact: critical
      mitigation: |
        Refactor data contracts (TypedDict) in Wave 1 BEFORE extracting classes.
        Ensure each class owns only immutable inputs/outputs.
        Keep integration tests running in parallel; extract unit tests incrementally.
        Use snapshot testing to validate output changes are intentional.

    - scenario: "Mypy type checking fails after refactoring."
      likelihood: medium
      impact: high
      mitigation: |
        Use TypedDict contracts before extraction. Run `tox -e typecheck` after each task.
        Keep type annotations incrementally; don't let them drift.
        Use type: ignore only when documented and paired with task_clarification.

    - scenario: "Public API (api.py, cli.py) breaks; downstream tools fail."
      likelihood: medium
      impact: critical
      mitigation: |
        Mark `run_scan`, `render_runbook`, `render_runbook_csv` as immutable public entrypoints.
        Create adapter layer (api.py, cli.py imports) that translate old symbol names to new classes.
        Test all public symbols in test_api.py; make API test suite mandatory on each wave.

    - scenario: "DI container becomes too complex; bootstrapping overhead balloons."
      likelihood: medium
      impact: medium
      mitigation: |
        Design DI to be simple: just 1 main container class or factory.
        If hand-crafted is >200 lines, evaluate dependency_injector library.
        Keep DI out of hot paths (scanning loop); lazily instantiate where possible.

    - scenario: "Performance regression; scanner becomes noticeably slower."
      likelihood: low
      impact: medium
      mitigation: |
        Benchmark run_scan on 3-5 test roles before/after each wave.
        Profile to identify bottlenecks before major refactor.
        Avoid allocating new objects per variable; reuse containers.

    - scenario: "Submodule consolidation collides with imports; creates huge 500-line modules."
      likelihood: medium
      impact: medium
      mitigation: |
        Target 100–200 lines per submodule. Split large consolidations (e.g., variable extraction)
        into variable_discovery.py (discovery) + variable_extractor.py (tokenization).
        Use __all__ exports to hide private helpers; keep public APIs small.

    - scenario: "Builder/Strategy patterns introduce too many classes; design becomes opaque."
      likelihood: low
      impact: medium
      mitigation: |
        Define 1 builder class per logical unit (e.g., VariableRowBuilder for rows).
        Use clear naming: *Builder, *Strategy. Keep __init__ methods simple.
        Document each builder's invariants (pre/post conditions) with docstrings.

  assumptions:
    - Public API symbols (run_scan, render_runbook, render_runbook_csv, api functions) will not change behavior.
    - TypedDict contracts are forward-compatible; adding optional fields won't break existing code.
    - 768 existing tests represent comprehensive behavioral contract; test suite is correct.
    - Scanner performance is acceptable now; refactoring should not degrade.
    - No external tools depend on scanner.py internal symbols; extraction is safe.
    - DI container does not need to be async-aware or thread-safe initially.
    - All variables extracted by scanner fit in memory; no streaming data flow needed.

implementation_specification:
  code_structure: |
    **Target Architecture:**

    ```
    src/prism/
    ├── scanner.py (reduced to ~500 lines: public API facade + DI bootstrap)
    ├── api.py (unchanged; imports from scanner module)
    ├── cli.py (unchanged; imports from scanner module)
    ├── scanner_core/
    │   ├── __init__.py
    │   ├── di.py (Dependency Injection container/factory)
    │   ├── scanner_context.py (Main orchestrator class)
    │   ├── variable_discovery.py (Variable extraction orchestration)
    │   ├── output_orchestrator.py (Output/rendering/sidecar coordination)
    │   └── feature_detector.py (Feature detection and analysis)
    ├── scanner_data/
    │   ├── __init__.py
    │   ├── contracts.py (All TypedDict contracts: Variable, Row, Context, etc.)
    │   ├── builders.py (Builder classes: VariableRowBuilder, ScanPayloadBuilder, etc.)
    │   └── strategies.py (Strategy classes for variable mutation/analysis)
    ├── scanner_io/
    │   ├── __init__.py
    │   ├── output.py (Output format primitives)
    │   ├── loader.py (YAML/data loading)
    │   └── writer.py (File writing)
    ├── scanner_readme/
    │   ├── __init__.py
    │   ├── render.py (README rendering, composition)
    │   ├── style.py (Style guide support)
    │   └── guide.py (Doc insights integration)
    ├── scanner_analysis/
    │   ├── __init__.py
    │   ├── scanner_report.py (Report generation)
    │   ├── runbook.py (Runbook rendering)
    │   ├── metrics.py (Metrics/counters)
    │   └── insights.py (Doc insights)
    ├── scanner_extract/
    │   ├── __init__.py
    │   ├── variable_extractor.py (Variable tokenization)
    │   ├── task_parser.py (Task/file parsing)
    │   ├── requirements.py (Requirement parsing)
    │   ├── discovery.py (discovery without extraction)
    │   └── config.py (Config/metadata parsing)
    └── scanner_submodules/ (deprecated; gradually eliminated)
        └── [legacy modules to be consolidated]
    ```

    **Key Design Patterns:**
    - **Dependency Injection:** DI container provides instances to orchestrators; no global state.
    - **Builder Pattern:** VariableRowBuilder, ScanPayloadBuilder eliminate procedural mutations.
    - **Strategy Pattern:** VariableTypeInferenceStrategy, UnresolvableVariableStrategy for pluggable behavior.
    - **Immutable Data:** TypedDict contracts are read-only after construction; builders are mutable, results are immutable.
    - **Adapter Pattern:** scanner.py public functions adapt to new internal architecture without changing signature.

  affected_areas:
    - src/prism/scanner.py (reduced 3,147 → ~500 lines)
    - src/prism/scanner_submodules/ (26 modules → 8 consolidated groups)
    - src/prism/tests/ (768 tests: reorg, add unit tests)
    - src/prism/api.py (minimal changes; imports only)
    - src/prism/cli.py (minimal changes; imports only)
    - pyproject.toml (optional: new submodule groups)

  component_details:
    - component: "Dependency Injection Container (di.py)"
      responsibility: |
        Instantiate and wire all orchestrator classes, submodule functions, and data builders.
        Provide factory methods for testing. Hide internal complexity from public API.
      interfaces:
        - "class DIContainer: factory_scanner_context(), factory_variable_discovery(), factory_output_orchestrator(), factory_feature_detector()"
        - "ScannerContext resolve_context(role_path, options) -> returns initialized ScannerContext ready to orchestrate"

    - component: "ScannerContext Orchestrator (scanner_core/scanner_context.py)"
      responsibility: |
        Main entry point orchestrator for run_scan. Coordinates variable discovery, output
        orchestration, and feature detection. Owns role path normalization and overall flow control.
      interfaces:
        - "class ScannerContext: __init__(di, role_path, options)"
        - "def orchestrate_scan() -> RunScanOutputPayload"
        - "Properties: discovered_variables, detected_features, scan_metadata"

    - component: "VariableDiscovery Orchestrator (scanner_core/variable_discovery.py)"
      responsibility: |
        Orchestrates variable discovery across defaults, vars, meta, include_vars, set_fact,
        readme sections. Returns canonical VariableRow set. No mutations; builders produce outputs.
      interfaces:
        - "class VariableDiscovery: __init__(di, role_path, options)"
        - "def discover() -> list[VariableRow]"
        - "def resolve_unresolved() -> dict[var_name, uncertainty_reason]"

    - component: "OutputOrchestrator (scanner_core/output_orchestrator.py)"
      responsibility: |
        Coordinates output rendering (README, JSON, HTML, PDF), scanner report sidecars,
        runbook generation, and writes. Replaces scan_output_emission.emit_scan_outputs
        and related wrappers.
      interfaces:
        - "class OutputOrchestrator: __init__(di, output_path, options)"
        - "def render_and_emit(payload: RunScanOutputPayload, dry_run: bool) -> str"
        - "def emit_runbook_sidecars(runbook_path, csv_path) -> dict[path, written_bytes]"

    - component: "FeatureDetector (scanner_core/feature_detector.py)"
      responsibility: |
        Detects role features (task counts, collections, handlers, etc.) and produces
        FeaturesContext. Replaces extract_role_features and related scattered logic.
      interfaces:
        - "class FeatureDetector: __init__(di, role_path)"
        - "def detect() -> FeaturesContext"
        - "def analyze_task_catalog() -> dict[task_file, task_metadata]"

    - component: "Data Contracts (scanner_data/contracts.py)"
      responsibility: |
        Central TypedDict definitions for Variable, VariableRow, ScanMetadata, RunScanOutputPayload,
        FeaturesContext, StyleGuideConfig, etc. No logic; purely structural.
      interfaces:
        - "TypedDict Variable, VariableRow, ScanMetadata, RunScanOutputPayload, FeaturesContext, etc."

    - component: "Builders (scanner_data/builders.py)"
      responsibility: |
        VariableRowBuilder, ScanPayloadBuilder, MetadataBuilder eliminate procedural mutations.
        Fluent interface. Validate invariants on build().
      interfaces:
        - "class VariableRowBuilder: name(str) -> Self; type(str) -> Self; ... -> VariableRow"
        - "class ScanPayloadBuilder: role_path(str) -> Self; variables(list[VariableRow]) -> Self; ... -> RunScanOutputPayload"

    - component: "Strategies (scanner_data/strategies.py)"
      responsibility: |
        Pluggable strategies for variable type inference, unresolved handling, secret detection,
        etc. Makes behavior testable and overrideable without subclassing.
      interfaces:
        - "class VariableTypeInferenceStrategy: infer(name, values) -> str"
        - "class UnresolvableVariableStrategy: report(name, reason) -> str"

    - component: "Consolidated Modules (scanner_extract/, scanner_readme/, scanner_analysis/, scanner_io/)"
      responsibility: |
        Original 26 submodules grouped by responsibility. Each group ~100–200 lines.
        Owned by corresponding orchestrator (e.g., VariableDiscovery owns scanner_extract/).
      interfaces:
        - "Functions exported via __all__; private helpers prefixed _"
        - "No inter-group imports except via orchestrators or contracts"

  dependencies:
    - component: VariableDiscovery
      relationship: "uses VariableRowBuilder (from scanner_data/builders.py)"

    - component: OutputOrchestrator
      relationship: "uses ScanPayloadBuilder (from scanner_data/builders.py)"

    - component: ScannerContext
      relationship: "orchestrates VariableDiscovery, OutputOrchestrator, FeatureDetector; depends on DIContainer"

    - component: DIContainer
      relationship: "instantiates all orchestrators; owned by scanner.py public API"

  integration_points:
    - "api.py imports run_scan, render_runbook, render_runbook_csv from scanner.py (unchanged)"
    - "cli.py imports run_scan, SECTION_CONFIG_FILENAMES from scanner.py (unchanged)"
    - "tests/ import from scanner.py and may import from new scanner_core/ classes directly for unit tests"
    - "External tools may import from api.py or cli.py; no breaking changes allowed"

