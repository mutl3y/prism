  - id: task_4_1_builder_pattern_variables
    title: "Implement builder pattern for variable row construction"
    description: |
      Create scanner_data/builders.py with VariableRowBuilder class.
      Replace procedural VariableRow mutation with builder pattern.

      Class interface:
      ```python
      class VariableRowBuilder:
        def name(self, name: str) -> Self: ...
        def type(self, type_: str) -> Self: ...
        def default(self, default: str) -> Self: ...
        def secret(self, is_secret: bool) -> Self: ...
        def required(self, required: bool) -> Self: ...
        def documented(self, documented: bool) -> Self: ...
        def source(self, source: str) -> Self: ...
        def provenance(self, source_file: str, line: int, confidence: float) -> Self: ...
        def uncertainty(self, reason: str) -> Self: ...
        def build(self) -> VariableRow: ...
      ```

      Replaces current code like:
      ```python
      row = {
        "name": var_name,
        "type": infer_type(...),
        ...
      }
      ```

      With:
      ```python
      row = (VariableRowBuilder()
        .name(var_name)
        .type(infer_type(...))
        .build())
      ```

      Implementation:
      - Fluent interface (returns Self)
      - Validate invariants on build() (name required, type valid, etc.)
      - Immutable after build() (return TypedDict, not mutable dict)
      - Optional fields support via builder defaults

      Test coverage:
      - Builder fluent interface tests
      - Invariant validation tests (missing required fields)
      - Immutability tests (can't mutate after build())
      - Equivalence test: old dict-based code produces identical rows as builder
