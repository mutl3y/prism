exclude: ^(debug_readmes/|REVIEW_README.*\.md$)

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^src/prism/tests/roles/

  - repo: local
    hooks:
      - id: black
        name: black
        entry: black
        language: system
        types: [python]

      - id: ruff
        name: ruff (auto-fix)
        entry: ruff check --fix
        language: system
        types: [python]

      - id: mypy-seams
        name: mypy (modernized seam modules)
        entry: mypy
        args:
          - src/prism
          - --exclude
          - src/prism/tests
        language: system
        pass_filenames: false
        types: [python]
